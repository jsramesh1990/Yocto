# kas/release/release.yml
header:
  version: 12
  includes:
    - ../base.yml

machine: "${MACHINE}"

local_conf_header:
  release: |
    # Production release settings
    INHERIT += "create-spdx"
    
    # Remove debug symbols for production
    IMAGE_GEN_DEBUGFS = "0"
    
    # Strip binaries
    INHIBIT_PACKAGE_STRIP = "0"
    
    # Versioning
    DISTRO_VERSION = "${RELEASE_VERSION}"
    
    # OTA preparation
    IMAGE_FSTYPES += "wic.gz"
    
    # Security hardening
    SECURITY_CFLAGS = "-fstack-protector-strong -D_FORTIFY_SOURCE=2"
