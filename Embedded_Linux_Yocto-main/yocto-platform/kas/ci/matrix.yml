# kas/ci/matrix.yml
header:
  version: 12
  
ci:
  machines:
    - raspberrypi4-64
    - raspberrypi5
    - imx8mmevk
    - qemux86-64
    - qemuarm64

local_conf_header:
  ci: |
    # CI-specific settings
    INHERIT += "testimage"
    TESTIMAGE_AUTO = "1"
    
    # Cache sstate in CI
    SSTATE_DIR = "/cache/sstate"
    DL_DIR = "/cache/downloads"
