# kas/base.yml
header:
  version: 12
  includes:
    - ../distro/platform.yml

repos:
  poky:
    url: "https://git.yoctoproject.org/git/poky"
    refspec: "kirkstone"
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: "https://github.com/openembedded/meta-openembedded.git"
    refspec: "kirkstone"
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-filesystems:

  meta-platform:
    url: "../../layers/meta-platform"
    path: "layers/meta-platform"

  meta-distro:
    url: "../../layers/meta-distro"
    path: "layers/meta-distro"

local_conf_header:
  standard: |
    PATCHRESOLVE = "noop"
    CONF_VERSION = "2"
    
    # Build performance
    BB_NUMBER_THREADS = "4"
    PARALLEL_MAKE = "-j 4"
    
    # Package management
    PACKAGE_CLASSES = "package_rpm"
    
    # Image generation
    IMAGE_FSTYPES = "wic wic.bz2 tar.bz2"
    
    # Disk space monitoring
    BB_DISKMON_DIRS = "\
        STOPTASKS,${TMPDIR},1G,100K \
        STOPTASKS,${DL_DIR},1G,100K \
        STOPTASKS,${SSTATE_DIR},1G,100K \
        ABORT,${TMPDIR},100M,1K \
        ABORT,${DL_DIR},100M,1K \
        ABORT,${SSTATE_DIR},100M,1K"
