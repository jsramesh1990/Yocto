# layers/meta-distro/conf/distro/platform.conf
require conf/distro/poky.conf

DISTRO = "platform"
DISTRO_NAME = "Platform Linux Distribution"
DISTRO_VERSION = "1.0"
DISTRO_CODENAME = "stable"

# Init system
INIT_MANAGER = "systemd"
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = ""

# Package feeds
PACKAGE_FEED_URIS = "http://feeds.platform.com/${DISTRO}/${DISTRO_VERSION}"

# Security features
DISTRO_FEATURES:append = " acl pam seccomp"
DISTRO_FEATURES:remove = "x11"

# Additional features
DISTRO_FEATURES:append = " systemd opengl pci usbhost"
POKY_DEFAULT_DISTRO_FEATURES:append = " virtualization"

# Image features
IMAGE_FEATURES:append = " ssh-server-openssh package-management"

# Language support
IMAGE_LINGUAS = "en-us"

# License handling
LICENSE_FLAGS_ACCEPTED = "commercial"
